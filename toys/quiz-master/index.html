<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Master — ROOCKY TOYS</title>
  <meta name="description" content="Test your knowledge across Tech, Science, Pop Culture, and more. Features difficulty modes, streak bonuses, and a leaderboard." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════ */
    /* ROOCKY DESIGN TOKENS                       */
    /* ═══════════════════════════════════════════ */
    :root {
      --bg-primary: #050508;
      --bg-secondary: #0a0a0f;
      --bg-elevated: #111118;
      --bg-card: #0d0d14;
      --bg-glass: rgba(255, 255, 255, 0.03);

      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-tertiary: #55556a;
      --text-accent: #a78bfa;

      --accent-primary: #a78bfa;
      --accent-secondary: #818cf8;
      --accent-glow: rgba(167, 139, 250, 0.15);
      --accent-glow-strong: rgba(167, 139, 250, 0.3);

      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.1);
      --border-accent: rgba(167, 139, 250, 0.2);

      --color-correct: #34d399;
      --color-correct-glow: rgba(52, 211, 153, 0.2);
      --color-wrong: #f87171;
      --color-wrong-glow: rgba(248, 113, 113, 0.2);
      --color-warning: #fbbf24;

      --radius-sm: 0.5rem;
      --radius-md: 1rem;
      --radius-lg: 1.5rem;
      --radius-xl: 2rem;
      --radius-full: 9999px;

      --ease-smooth: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-snap: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ═══════════════════════════════════════════ */
    /* RESET & BASE                               */
    /* ═══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    ::selection {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }

    /* ═══════════════════════════════════════════ */
    /* GRAIN OVERLAY                              */
    /* ═══════════════════════════════════════════ */
    .grain-overlay {
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.025;
      animation: grain 8s steps(10) infinite;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    }

    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -10%); }
      20% { transform: translate(-15%, 5%); }
      30% { transform: translate(7%, -25%); }
      40% { transform: translate(-5%, 25%); }
      50% { transform: translate(-15%, 10%); }
      60% { transform: translate(15%, 0%); }
      70% { transform: translate(0%, 15%); }
      80% { transform: translate(3%, 35%); }
      90% { transform: translate(-10%, 10%); }
    }

    /* ═══════════════════════════════════════════ */
    /* DOT GRID                                   */
    /* ═══════════════════════════════════════════ */
    .dot-grid {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
    }

    /* ═══════════════════════════════════════════ */
    /* ANIMATIONS                                 */
    /* ═══════════════════════════════════════════ */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slide-out-left {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-40px); }
    }

    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @keyframes timer-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--color-warning); }
      50% { box-shadow: 0 0 20px 4px rgba(251, 191, 36, 0.3); }
    }

    @keyframes streak-flash {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); text-shadow: 0 0 20px var(--accent-glow-strong); }
      100% { transform: scale(1); }
    }

    @keyframes count-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════ */
    /* SCROLLBAR                                  */
    /* ═══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }

    /* ═══════════════════════════════════════════ */
    /* TYPOGRAPHY                                 */
    /* ═══════════════════════════════════════════ */
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.875rem;
      border-radius: var(--radius-full);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════ */
    /* GAME CONTAINER                             */
    /* ═══════════════════════════════════════════ */
    .game-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ═══════════════════════════════════════════ */
    /* GLASS CARD                                 */
    /* ═══════════════════════════════════════════ */
    .glass-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      width: 100%;
      overflow: hidden;
    }

    .glass-card-elevated {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 20px 60px -15px rgba(0, 0, 0, 0.5),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
    }

    /* ═══════════════════════════════════════════ */
    /* SCREENS                                    */
    /* ═══════════════════════════════════════════ */
    .screen {
      display: none;
      width: 100%;
      animation: fade-up 0.6s var(--ease-out) both;
    }

    .screen.active { display: block; }

    /* ═══════════════════════════════════════════ */
    /* START SCREEN                               */
    /* ═══════════════════════════════════════════ */
    .start-header {
      text-align: center;
      padding: 3rem 2rem 2rem;
    }

    .start-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .start-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .start-header h1 .accent {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Category Selection */
    .category-section {
      padding: 1.5rem 2rem;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .category-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1rem 0.75rem;
      cursor: pointer;
      transition: all 0.4s var(--ease-smooth);
      text-align: center;
      color: var(--text-secondary);
    }

    .category-btn:hover {
      border-color: var(--border-accent);
      background: rgba(255, 255, 255, 0.04);
    }

    .category-btn.selected {
      border-color: var(--accent-primary);
      background: rgba(167, 139, 250, 0.08);
      color: var(--text-primary);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .category-btn-emoji {
      font-size: 1.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .category-btn-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Difficulty Selection */
    .difficulty-section {
      padding: 1rem 2rem;
    }

    .difficulty-options {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .difficulty-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1rem;
      cursor: pointer;
      transition: all 0.4s var(--ease-smooth);
      text-align: center;
      color: var(--text-secondary);
    }

    .difficulty-btn:hover {
      border-color: var(--border-accent);
    }

    .difficulty-btn.selected {
      border-color: var(--accent-primary);
      background: rgba(167, 139, 250, 0.08);
      color: var(--text-primary);
    }

    .difficulty-btn-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.25rem;
    }

    .difficulty-btn-detail {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
    }

    /* Start Button */
    .start-actions {
      padding: 1.5rem 2rem 2rem;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 2rem;
      background: var(--accent-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-full);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.5s var(--ease-smooth);
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(167, 139, 250, 0.3);
    }

    .btn-primary:active { transform: scale(0.98); }

    .btn-primary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-ghost {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 2rem;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-full);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.5s var(--ease-smooth);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-accent);
      color: var(--accent-primary);
    }

    /* ═══════════════════════════════════════════ */
    /* QUESTION SCREEN                            */
    /* ═══════════════════════════════════════════ */
    .question-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .question-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    .question-category-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-full);
      background: rgba(167, 139, 250, 0.08);
      color: var(--accent-primary);
      border: 1px solid rgba(167, 139, 250, 0.12);
    }

    /* Progress Bar */
    .progress-track {
      height: 3px;
      background: var(--bg-elevated);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 0 2px 2px 0;
      transition: width 0.5s var(--ease-smooth);
    }

    /* Timer */
    .timer-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.25rem 2rem 0.75rem;
    }

    .timer-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      min-width: 60px;
      text-align: center;
      transition: color 0.3s ease;
    }

    .timer-display.warning { color: var(--color-warning); animation: timer-pulse 0.5s ease infinite; }
    .timer-display.danger { color: var(--color-wrong); animation: timer-pulse 0.3s ease infinite; }

    .timer-bar-track {
      flex: 1;
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
      overflow: hidden;
    }

    .timer-bar-fill {
      height: 100%;
      background: var(--accent-primary);
      border-radius: 2px;
      transition: width 0.1s linear, background 0.3s ease;
    }

    .timer-bar-fill.warning { background: var(--color-warning); }
    .timer-bar-fill.danger { background: var(--color-wrong); }

    /* Score & Streak HUD */
    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 2rem 1rem;
    }

    .hud-item {
      text-align: center;
    }

    .hud-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .hud-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .streak-fire {
      animation: streak-flash 0.5s ease;
    }

    /* Question Text */
    .question-body {
      padding: 1.5rem 2rem;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
    }

    /* Answer Options */
    .answers-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .answer-btn {
      position: relative;
      width: 100%;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      text-align: left;
      cursor: pointer;
      transition: all 0.4s var(--ease-smooth);
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .answer-btn:hover:not(:disabled) {
      border-color: var(--border-accent);
      background: rgba(255, 255, 255, 0.04);
      transform: translateX(4px);
    }

    .answer-btn:disabled { cursor: default; }

    .answer-btn .answer-key {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .answer-btn.correct {
      border-color: var(--color-correct);
      background: rgba(52, 211, 153, 0.06);
      box-shadow: 0 0 20px var(--color-correct-glow);
    }

    .answer-btn.correct .answer-key {
      background: var(--color-correct);
      color: var(--bg-primary);
      border-color: var(--color-correct);
    }

    .answer-btn.wrong {
      border-color: var(--color-wrong);
      background: rgba(248, 113, 113, 0.06);
      animation: shake 0.4s ease;
    }

    .answer-btn.wrong .answer-key {
      background: var(--color-wrong);
      color: var(--bg-primary);
      border-color: var(--color-wrong);
    }

    .answer-btn.reveal-correct {
      border-color: var(--color-correct);
      background: rgba(52, 211, 153, 0.04);
    }

    .answer-btn.reveal-correct .answer-key {
      background: var(--color-correct);
      color: var(--bg-primary);
      border-color: var(--color-correct);
    }

    /* Feedback Banner */
    .feedback-banner {
      display: none;
      padding: 1rem 2rem;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fade-in 0.3s ease;
    }

    .feedback-banner.correct {
      display: block;
      color: var(--color-correct);
      background: rgba(52, 211, 153, 0.04);
      border-top: 1px solid rgba(52, 211, 153, 0.1);
    }

    .feedback-banner.wrong {
      display: block;
      color: var(--color-wrong);
      background: rgba(248, 113, 113, 0.04);
      border-top: 1px solid rgba(248, 113, 113, 0.1);
    }

    .feedback-banner.timeout {
      display: block;
      color: var(--color-warning);
      background: rgba(251, 191, 36, 0.04);
      border-top: 1px solid rgba(251, 191, 36, 0.1);
    }

    .feedback-points {
      display: block;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 0.25rem;
      letter-spacing: 0.15em;
    }

    /* ═══════════════════════════════════════════ */
    /* RESULTS SCREEN                             */
    /* ═══════════════════════════════════════════ */
    .results-header {
      text-align: center;
      padding: 3rem 2rem 2rem;
    }

    .results-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: scale-in 0.5s var(--ease-snap) both;
    }

    .results-header h2 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      animation: fade-up 0.6s var(--ease-out) 0.1s both;
    }

    .results-header .results-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      animation: fade-up 0.6s var(--ease-out) 0.2s both;
    }

    /* Score Display */
    .results-score {
      text-align: center;
      padding: 2rem;
      animation: count-up 0.8s var(--ease-out) 0.3s both;
    }

    .results-score-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .results-score-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* Stats Grid */
    .results-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      padding: 0 2rem 1.5rem;
    }

    .result-stat {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1rem;
      text-align: center;
      animation: fade-up 0.5s var(--ease-out) both;
    }

    .result-stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .result-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-top: 0.25rem;
    }

    /* Category Breakdown */
    .results-breakdown {
      padding: 0 2rem 1.5rem;
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .breakdown-row:last-child { border-bottom: none; }

    .breakdown-cat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;

    }

    .breakdown-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-primary);
    }

    /* Results Actions */
    .results-actions {
      padding: 1rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ═══════════════════════════════════════════ */
    /* LEADERBOARD                                */
    /* ═══════════════════════════════════════════ */
    .leaderboard-section {
      padding: 0 2rem 2rem;
    }

    .leaderboard-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      transition: background 0.2s ease;
    }

    .leaderboard-entry:hover { background: rgba(255, 255, 255, 0.02); }

    .leaderboard-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
      width: 32px;
    }

    .leaderboard-rank.gold { color: #fbbf24; }
    .leaderboard-rank.silver { color: #94a3b8; }
    .leaderboard-rank.bronze { color: #f59e0b; }

    .leaderboard-info {
      flex: 1;
      margin-left: 0.5rem;
    }

    .leaderboard-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    .leaderboard-detail {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    .leaderboard-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    /* ═══════════════════════════════════════════ */
    /* CONFETTI                                   */
    /* ═══════════════════════════════════════════ */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }

    /* ═══════════════════════════════════════════ */
    /* TOAST NOTIFICATION                         */
    /* ═══════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      z-index: 70;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-full);
      background: var(--accent-primary);
      color: var(--bg-primary);
      font-weight: 600;
      transition: transform 0.5s var(--ease-snap);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ═══════════════════════════════════════════ */
    /* SOUND TOGGLE                               */
    /* ═══════════════════════════════════════════ */
    .sound-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 40;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s var(--ease-smooth);
      font-size: 16px;
      color: var(--text-secondary);
    }

    .sound-toggle:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-accent);
    }

    /* ═══════════════════════════════════════════ */
    /* RESPONSIVE                                 */
    /* ═══════════════════════════════════════════ */
    @media (max-width: 520px) {
      .game-container { padding: 1rem; }
      .start-header { padding: 2rem 1.25rem 1.5rem; }
      .start-header h1 { font-size: 2rem; }
      .category-section, .difficulty-section, .start-actions,
      .question-header, .timer-section, .hud, .question-body,
      .results-header, .results-score, .results-stats,
      .results-breakdown, .results-actions, .leaderboard-section,
      .feedback-banner { padding-left: 1.25rem; padding-right: 1.25rem; }
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      .difficulty-options { flex-direction: column; }
      .results-score-num { font-size: 3rem; }
      .question-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- ═══ GAME ═══ -->
  <div class="game-container">

    <!-- ═══ START SCREEN ═══ -->
    <div class="screen active" id="screen-start">
      <div class="glass-card glass-card-elevated">
        <div class="start-header">
          <div class="start-emoji">🧠</div>

    <!-- ═══ RESULTS SCREEN ═══ -->
    <div class="screen" id="screen-results">
      <div class="glass-card glass-card-elevated">
        <div class="results-header">
          <div class="results-emoji" id="results-emoji">🏆</div>
          <h2 id="results-title">Amazing!</h2>
          <p class="results-subtitle" id="results-subtitle">You really know your stuff.</p>
        </div>

        <div class="results-score">
          <div class="results-score-num" id="results-score-num">0</div>
          <div class="results-score-label">Total Points</div>
        </div>

        <div class="results-stats" id="results-stats">
          <!-- Populated by JS -->
        </div>

        <div class="results-breakdown" id="results-breakdown">
          <span class="label" style="margin-bottom: 0.75rem; display: block;">Category Breakdown</span>
          <!-- Populated by JS -->
        </div>

        <div class="leaderboard-section" id="leaderboard-section">
          <span class="label" style="margin-bottom: 0.75rem; display: block;">🏅 High Scores</span>
          <div id="leaderboard-list"></div>
        </div>

        <div class="results-actions">
          <button class="btn-primary" onclick="restartGame()">Play Again →</button>
          <button class="btn-ghost" onclick="shareResults()">📋 Copy Results</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    /* ═══════════════════════════════════════════ */
    /* QUESTION DATABASE                          */
    /* ═══════════════════════════════════════════ */
    const CATEGORIES = {
      tech: { name: 'Tech', emoji: '💻' },
      science: { name: 'Science', emoji: '🔬' },
      popculture: { name: 'Pop Culture', emoji: '🎬' },
      general: { name: 'General', emoji: '🌍' },
      gaming: { name: 'Gaming', emoji: '🎮' },
    };

    const QUESTIONS = [
      // ══ TECH ══
      { category: 'tech', q: 'What does HTML stand for?', options: ['HyperText Markup Language', 'High Tech Modern Language', 'HyperTransfer Markup Logic', 'Home Tool Markup Language'], answer: 0 },
      { category: 'tech', q: 'Which company developed the Rust programming language?', options: ['Google', 'Microsoft', 'Mozilla', 'Apple'], answer: 2 },
      { category: 'tech', q: 'What is the time complexity of binary search?', options: ['O(n)', 'O(log n)', 'O(n²)', 'O(1)'], answer: 1 },
      { category: 'tech', q: 'Which protocol is used for secure web communication?', options: ['HTTP', 'FTP', 'HTTPS', 'SMTP'], answer: 2 },
      { category: 'tech', q: 'What year was the first iPhone released?', options: ['2005', '2006', '2007', '2008'], answer: 2 },
      { category: 'tech', q: 'What does CSS stand for?', options: ['Computer Style Sheets', 'Creative Style System', 'Cascading Style Sheets', 'Colorful Style Scripts'], answer: 2 },
      { category: 'tech', q: 'Which language is often called the backbone of the web?', options: ['Python', 'JavaScript', 'C++', 'Ruby'], answer: 1 },
      { category: 'tech', q: 'What does API stand for?', options: ['Application Programming Interface', 'Applied Protocol Integration', 'Automated Program Interaction', 'Application Process Input'], answer: 0 },
      { category: 'tech', q: 'Who co-founded Apple with Steve Jobs?', options: ['Bill Gates', 'Steve Wozniak', 'Tim Cook', 'Elon Musk'], answer: 1 },
      { category: 'tech', q: 'Which data structure uses LIFO (Last In, First Out)?', options: ['Queue', 'Stack', 'Array', 'Linked List'], answer: 1 },

      // ══ SCIENCE ══
      { category: 'science', q: 'What is the chemical symbol for gold?', options: ['Go', 'Gd', 'Au', 'Ag'], answer: 2 },
      { category: 'science', q: 'How many bones are in the adult human body?', options: ['186', '206', '216', '256'], answer: 1 },
      { category: 'science', q: 'What is the speed of light in vacuum (approx)?', options: ['300,000 km/s', '150,000 km/s', '500,000 km/s', '1,000,000 km/s'], answer: 0 },
      { category: 'science', q: 'What planet is known as the Red Planet?', options: ['Venus', 'Jupiter', 'Mars', 'Saturn'], answer: 2 },
      { category: 'science', q: 'What is the powerhouse of the cell?', options: ['Nucleus', 'Ribosome', 'Mitochondria', 'Golgi apparatus'], answer: 2 },
      { category: 'science', q: 'What element has the atomic number 1?', options: ['Helium', 'Hydrogen', 'Lithium', 'Carbon'], answer: 1 },
      { category: 'science', q: 'What force keeps planets in orbit around the Sun?', options: ['Electromagnetic', 'Nuclear', 'Gravity', 'Friction'], answer: 2 },
      { category: 'science', q: 'How long does it take light from the Sun to reach Earth?', options: ['1 minute', '8 minutes', '30 minutes', '1 hour'], answer: 1 },
      { category: 'science', q: 'What is the most abundant gas in Earth\'s atmosphere?', options: ['Oxygen', 'Carbon Dioxide', 'Nitrogen', 'Argon'], answer: 2 },
      { category: 'science', q: 'What is the pH of pure water?', options: ['5', '7', '9', '10'], answer: 1 },

      // ══ POP CULTURE ══
      { category: 'popculture', q: 'Which film franchise features a character named "The Child" (Baby Yoda)?', options: ['Star Trek', 'Star Wars', 'Guardians of the Galaxy', 'Dune'], answer: 1 },
      { category: 'popculture', q: 'What band released the album "Abbey Road"?', options: ['The Rolling Stones', 'Led Zeppelin', 'The Beatles', 'Pink Floyd'], answer: 2 },
      { category: 'popculture', q: 'Who directed the movie "Inception"?', options: ['Steven Spielberg', 'Christopher Nolan', 'James Cameron', 'Ridley Scott'], answer: 1 },
      { category: 'popculture', q: 'What is the name of the fictional country in "Black Panther"?', options: ['Zamunda', 'Wakanda', 'Genovia', 'Latveria'], answer: 1 },
      { category: 'popculture', q: 'Which artist is known as the "Queen of Pop"?', options: ['Beyoncé', 'Lady Gaga', 'Madonna', 'Whitney Houston'], answer: 2 },
      { category: 'popculture', q: 'What show features the character Walter White?', options: ['Dexter', 'The Wire', 'Better Call Saul', 'Breaking Bad'], answer: 3 },
      { category: 'popculture', q: 'Who painted the Mona Lisa?', options: ['Picasso', 'Michelangelo', 'Leonardo da Vinci', 'Van Gogh'], answer: 2 },
      { category: 'popculture', q: 'What streaming platform produced "Squid Game"?', options: ['Disney+', 'Amazon Prime', 'Netflix', 'HBO Max'], answer: 2 },

      // ══ GENERAL KNOWLEDGE ══
      { category: 'general', q: 'What is the largest country by land area?', options: ['China', 'USA', 'Canada', 'Russia'], answer: 3 },
      { category: 'general', q: 'How many continents are there on Earth?', options: ['5', '6', '7', '8'], answer: 2 },
      { category: 'general', q: 'What is the longest river in the world?', options: ['Amazon', 'Nile', 'Yangtze', 'Mississippi'], answer: 1 },
      { category: 'general', q: 'Which ocean is the largest?', options: ['Atlantic', 'Indian', 'Arctic', 'Pacific'], answer: 3 },
      { category: 'general', q: 'What currency is used in Japan?', options: ['Yuan', 'Won', 'Yen', 'Ringgit'], answer: 2 },
      { category: 'general', q: 'What is the capital of Australia?', options: ['Sydney', 'Melbourne', 'Canberra', 'Brisbane'], answer: 2 },
      { category: 'general', q: 'How many players are on a soccer team?', options: ['9', '10', '11', '12'], answer: 2 },
      { category: 'general', q: 'What year did the Titanic sink?', options: ['1905', '1912', '1918', '1923'], answer: 1 },

      // ══ GAMING ══
      { category: 'gaming', q: 'What is the best-selling video game of all time?', options: ['Tetris', 'GTA V', 'Minecraft', 'Wii Sports'], answer: 2 },
      { category: 'gaming', q: 'In which game do you fight creatures called Creepers?', options: ['Roblox', 'Minecraft', 'Terraria', 'Fortnite'], answer: 1 },
      { category: 'gaming', q: 'What company developed "The Legend of Zelda"?', options: ['Sony', 'Microsoft', 'Sega', 'Nintendo'], answer: 3 },
      { category: 'gaming', q: 'What is the name of Mario\'s brother?', options: ['Wario', 'Luigi', 'Toad', 'Bowser'], answer: 1 },
      { category: 'gaming', q: 'Which game features a Battle Royale on an island with a storm circle?', options: ['PUBG', 'Apex Legends', 'Fortnite', 'All of the above'], answer: 3 },
      { category: 'gaming', q: 'What year was the original PlayStation released in Japan?', options: ['1992', '1994', '1996', '1998'], answer: 1 },
      { category: 'gaming', q: 'In "Among Us", what are the impostors trying to do?', options: ['Complete tasks', 'Eliminate crewmates', 'Find treasure', 'Build a spaceship'], answer: 1 },
      { category: 'gaming', q: 'What game franchise features Master Chief?', options: ['Gears of War', 'Destiny', 'Halo', 'Call of Duty'], answer: 2 },
    ];

    /* ═══════════════════════════════════════════ */
    /* GAME STATE                                 */
    /* ═══════════════════════════════════════════ */
    let state = {
      selectedCategories: Object.keys(CATEGORIES),
      difficulty: 'easy',
      questions: [],
      currentIndex: 0,
      score: 0,
      streak: 0,
      bestStreak: 0,
      correctCount: 0,
      totalAnswered: 0,
      timerMax: 10,
      timerLeft: 10,
      timerInterval: null,
      gameStartTime: null,
      gameEndTime: null,
      categoryScores: {},
      soundEnabled: true,
    };

    const DIFFICULTY_CONFIG = {
      easy: { time: 10, multiplier: 1, label: 'Easy' },
      medium: { time: 7, multiplier: 1.5, label: 'Medium' },
      hard: { time: 5, multiplier: 2, label: 'Hard' },
    };

    const NUM_QUESTIONS = 10;

    /* ═══════════════════════════════════════════ */
    /* SOUND ENGINE (Web Audio API)               */
    /* ═══════════════════════════════════════════ */
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playSound(type) {
      if (!state.soundEnabled) return;
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        const now = ctx.currentTime;

        switch (type) {
          case 'correct':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.setValueAtTime(659.25, now + 0.1);
            osc.frequency.setValueAtTime(783.99, now + 0.2);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
            break;

          case 'wrong':
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.setValueAtTime(150, now + 0.15);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
            break;

          case 'tick':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
            break;

          case 'timeout':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.5);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
            break;

          case 'streak':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(554.37, now + 0.08);
            osc.frequency.setValueAtTime(659.25, now + 0.16);
            osc.frequency.setValueAtTime(880, now + 0.24);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
            break;

          case 'finish':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.setValueAtTime(659.25, now + 0.15);
            osc.frequency.setValueAtTime(783.99, now + 0.3);
            osc.frequency.setValueAtTime(1046.5, now + 0.45);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
            break;
        }
      } catch (e) {
        // Audio not available
      }
    }

    // Sound toggle
    const soundToggle = document.getElementById('sound-toggle');
    soundToggle.addEventListener('click', () => {
      state.soundEnabled = !state.soundEnabled;
      soundToggle.textContent = state.soundEnabled ? '🔊' : '🔇';
    });

    /* ═══════════════════════════════════════════ */
    /* CATEGORY SELECTION                         */
    /* ═══════════════════════════════════════════ */
    const categoryGrid = document.getElementById('category-grid');

    // Build "All" + individual category buttons
    const allBtn = document.createElement('button');
    allBtn.className = 'category-btn selected';
    allBtn.dataset.cat = 'all';
    allBtn.innerHTML = `<span class="category-btn-emoji">🌟</span><span class="category-btn-label">All</span>`;
    allBtn.onclick = () => toggleCategory('all');
    categoryGrid.appendChild(allBtn);

    Object.entries(CATEGORIES).forEach(([key, cat]) => {
      const btn = document.createElement('button');
      btn.className = 'category-btn';
      btn.dataset.cat = key;
      btn.innerHTML = `<span class="category-btn-emoji">${cat.emoji}</span><span class="category-btn-label">${cat.name}</span>`;
      btn.onclick = () => toggleCategory(key);
      categoryGrid.appendChild(btn);
    });

    function toggleCategory(cat) {
      if (cat === 'all') {
        state.selectedCategories = Object.keys(CATEGORIES);
        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.classList.toggle('selected', btn.dataset.cat === 'all');
        });
      } else {
        // Deselect "All"
        document.querySelector('.category-btn[data-cat="all"]').classList.remove('selected');

        const idx = state.selectedCategories.indexOf(cat);
        if (idx > -1) {
          state.selectedCategories.splice(idx, 1);
        } else {
          state.selectedCategories.push(cat);
        }

        // If all are selected, activate "All" button
        if (state.selectedCategories.length === Object.keys(CATEGORIES).length) {
          document.querySelector('.category-btn[data-cat="all"]').classList.add('selected');
          document.querySelectorAll('.category-btn:not([data-cat="all"])').forEach(btn => btn.classList.remove('selected'));
        } else {
          document.querySelectorAll('.category-btn:not([data-cat="all"])').forEach(btn => {
            btn.classList.toggle('selected', state.selectedCategories.includes(btn.dataset.cat));
          });
        }
      }

      // Disable start if no categories
      document.getElementById('btn-start').disabled = state.selectedCategories.length === 0;
    }

    function selectDifficulty(diff) {
      state.difficulty = diff;
      document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.diff === diff);
      });
    }

    /* ═══════════════════════════════════════════ */
    /* GAME LOGIC                                 */
    /* ═══════════════════════════════════════════ */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startGame() {
      if (state.selectedCategories.length === 0) return;

      // Filter questions by selected categories
      const pool = QUESTIONS.filter(q => state.selectedCategories.includes(q.category));
      state.questions = shuffleArray(pool).slice(0, NUM_QUESTIONS);

      // Reset state
      state.currentIndex = 0;
      state.score = 0;
      state.streak = 0;
      state.bestStreak = 0;
      state.correctCount = 0;
      state.totalAnswered = 0;
      state.timerMax = DIFFICULTY_CONFIG[state.difficulty].time;
      state.categoryScores = {};
      state.gameStartTime = Date.now();

      showScreen('screen-question');
      loadQuestion();
    }

    function loadQuestion() {
      const q = state.questions[state.currentIndex];
      const total = state.questions.length;

      // Update header
      document.getElementById('q-counter').textContent = `Q${state.currentIndex + 1} / ${total}`;
      document.getElementById('q-category').textContent = CATEGORIES[q.category].emoji + ' ' + CATEGORIES[q.category].name;

      // Progress
      document.getElementById('progress-fill').style.width = `${(state.currentIndex / total) * 100}%`;

      // Question text
      document.getElementById('q-text').textContent = q.q;

      // Answers
      const grid = document.getElementById('answers-grid');
      grid.innerHTML = '';
      const keys = ['A', 'B', 'C', 'D'];
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerHTML = `<span class="answer-key">${keys[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
      });

      // HUD
      document.getElementById('hud-score').textContent = state.score;
      document.getElementById('hud-streak').textContent = `${state.streak} 🔥`;
      document.getElementById('hud-correct').textContent = `${state.correctCount}/${state.totalAnswered}`;

      // Reset feedback
      const fb = document.getElementById('feedback-banner');
      fb.className = 'feedback-banner';

      // Start timer
      startTimer();

      // Animate question body
      const body = document.getElementById('question-body');
      body.style.animation = 'none';
      void body.offsetHeight;
      body.style.animation = 'slide-in-right 0.4s var(--ease-out) both';
    }

    function startTimer() {
      clearInterval(state.timerInterval);
      state.timerLeft = state.timerMax;
      updateTimerDisplay();

      state.timerInterval = setInterval(() => {
        state.timerLeft -= 0.1;
        if (state.timerLeft <= 0) {
          state.timerLeft = 0;
          clearInterval(state.timerInterval);
          handleTimeout();
        }
        updateTimerDisplay();

        // Tick sound in last 3 seconds
        if (state.timerLeft <= 3 && state.timerLeft > 0 && Math.abs(state.timerLeft - Math.round(state.timerLeft)) < 0.05) {
          playSound('tick');
        }
      }, 100);
    }

    function updateTimerDisplay() {
      const display = document.getElementById('timer-display');
      const fill = document.getElementById('timer-bar-fill');
      const secs = Math.ceil(state.timerLeft);
      display.textContent = secs;

      const pct = (state.timerLeft / state.timerMax) * 100;
      fill.style.width = `${pct}%`;

      // Color states
      display.classList.remove('warning', 'danger');
      fill.classList.remove('warning', 'danger');

      if (state.timerLeft <= 3) {
        display.classList.add('danger');
        fill.classList.add('danger');
      } else if (state.timerLeft <= 5) {
        display.classList.add('warning');
        fill.classList.add('warning');
      }
    }

    function handleTimeout() {
      playSound('timeout');
      disableAnswers();

      const q = state.questions[state.currentIndex];
      const btns = document.querySelectorAll('.answer-btn');
      btns[q.answer].classList.add('reveal-correct');

      state.streak = 0;
      state.totalAnswered++;

      showFeedback('timeout', 0);
      updateHUD();

      setTimeout(nextQuestion, 2000);
    }

    function selectAnswer(idx) {
      clearInterval(state.timerInterval);
      disableAnswers();

      const q = state.questions[state.currentIndex];
      const btns = document.querySelectorAll('.answer-btn');
      const isCorrect = idx === q.answer;

      if (isCorrect) {
        btns[idx].classList.add('correct');

        // Calculate points
        const timeBonus = Math.round((state.timerLeft / state.timerMax) * 50);
        const diffMultiplier = DIFFICULTY_CONFIG[state.difficulty].multiplier;
        let points = Math.round((100 + timeBonus) * diffMultiplier);

        state.streak++;
        if (state.streak > state.bestStreak) state.bestStreak = state.streak;
        state.correctCount++;

        // Streak bonus
        let streakBonus = 0;
        if (state.streak >= 3) {
          streakBonus = state.streak * 10;
          points += streakBonus;
          playSound('streak');
          const hudStreak = document.getElementById('hud-streak');
          hudStreak.classList.remove('streak-fire');
          void hudStreak.offsetHeight;
          hudStreak.classList.add('streak-fire');
        } else {
          playSound('correct');
        }

        state.score += points;

        // Category score tracking
        if (!state.categoryScores[q.category]) {
          state.categoryScores[q.category] = { correct: 0, total: 0, points: 0 };
        }
        state.categoryScores[q.category].correct++;
        state.categoryScores[q.category].points += points;

        showFeedback('correct', points, streakBonus);
      } else {
        btns[idx].classList.add('wrong');
        btns[q.answer].classList.add('reveal-correct');
        state.streak = 0;
        playSound('wrong');
        showFeedback('wrong', 0);
      }

      state.totalAnswered++;

      // Track category
      if (!state.categoryScores[q.category]) {
        state.categoryScores[q.category] = { correct: 0, total: 0, points: 0 };
      }
      state.categoryScores[q.category].total++;

      updateHUD();
      setTimeout(nextQuestion, 1800);
    }

    function disableAnswers() {
      document.querySelectorAll('.answer-btn').forEach(btn => btn.disabled = true);
    }

    function showFeedback(type, points, streakBonus = 0) {
      const fb = document.getElementById('feedback-banner');
      const fbText = document.getElementById('feedback-text');
      const fbPts = document.getElementById('feedback-points');

      fb.className = `feedback-banner ${type}`;

      if (type === 'correct') {
        fbText.textContent = state.streak >= 3 ? `🔥 ${state.streak}× Streak! Correct!` : '✓ Correct!';
        fbPts.textContent = `+${points} PTS${streakBonus > 0 ? ` (includes ${streakBonus} streak bonus)` : ''}`;
      } else if (type === 'wrong') {
        fbText.textContent = '✗ Wrong answer';
        fbPts.textContent = 'Streak reset to 0';
      } else {
        fbText.textContent = '⏰ Time\'s up!';
        fbPts.textContent = 'No points awarded';
      }
    }

    function updateHUD() {
      document.getElementById('hud-score').textContent = state.score;
      document.getElementById('hud-streak').textContent = `${state.streak} 🔥`;
      document.getElementById('hud-correct').textContent = `${state.correctCount}/${state.totalAnswered}`;
    }

    function nextQuestion() {
      state.currentIndex++;
      if (state.currentIndex >= state.questions.length) {
        endGame();
      } else {
        loadQuestion();
      }
    }

    function endGame() {
      clearInterval(state.timerInterval);
      state.gameEndTime = Date.now();
      playSound('finish');

      // Update progress bar to full
      document.getElementById('progress-fill').style.width = '100%';

      // Determine title and emoji based on accuracy
      const accuracy = state.questions.length > 0 ? (state.correctCount / state.questions.length) * 100 : 0;
      let emoji, title, subtitle;

      if (accuracy >= 90) {
        emoji = '🏆'; title = 'Legendary!'; subtitle = 'You crushed it. Absolute mastery.';
        spawnConfetti();
      } else if (accuracy >= 70) {
        emoji = '🌟'; title = 'Impressive!'; subtitle = 'You really know your stuff.';
        spawnConfetti();
      } else if (accuracy >= 50) {
        emoji = '👍'; title = 'Not Bad!'; subtitle = 'A solid effort. Room to grow.';
      } else if (accuracy >= 30) {
        emoji = '📚'; title = 'Keep Learning!'; subtitle = 'Practice makes perfect.';
      } else {
        emoji = '💪'; title = 'Don\'t Give Up!'; subtitle = 'Every attempt makes you stronger.';
      }

      document.getElementById('results-emoji').textContent = emoji;
      document.getElementById('results-title').textContent = title;
      document.getElementById('results-subtitle').textContent = subtitle;

      // Animated score counter
      const scoreEl = document.getElementById('results-score-num');
      animateCounter(scoreEl, state.score);

      // Stats
      const timeTaken = Math.round((state.gameEndTime - state.gameStartTime) / 1000);
      const statsEl = document.getElementById('results-stats');
      const stats = [
        { value: `${Math.round(accuracy)}%`, label: 'Accuracy' },
        { value: `${timeTaken}s`, label: 'Time Taken' },
        { value: `${state.bestStreak}`, label: 'Best Streak' },
        { value: DIFFICULTY_CONFIG[state.difficulty].label, label: 'Difficulty' },
      ];

      statsEl.innerHTML = stats.map((s, i) => `
        <div class="result-stat" style="animation-delay: ${0.4 + i * 0.1}s">
          <div class="result-stat-value">${s.value}</div>
          <div class="result-stat-label">${s.label}</div>
        </div>
      `).join('');

      // Category breakdown
      const breakdownEl = document.getElementById('results-breakdown');
      let breakdownHTML = '<span class="label" style="margin-bottom: 0.75rem; display: block;">Category Breakdown</span>';
      Object.entries(state.categoryScores).forEach(([cat, data]) => {
        if (data.total > 0) {
          breakdownHTML += `
            <div class="breakdown-row">
              <span class="breakdown-cat">${CATEGORIES[cat].emoji} ${CATEGORIES[cat].name}</span>
              <span class="breakdown-score">${data.correct}/${data.total} · ${data.points || 0} pts</span>
            </div>
          `;
        }
      });
      breakdownEl.innerHTML = breakdownHTML;

      // Save & show leaderboard
      saveScore(state.score, accuracy, timeTaken);
      renderLeaderboard();

      showScreen('screen-results');
    }

    function animateCounter(el, target) {
      let current = 0;
      const duration = 1500;
      const start = performance.now();

      function step(ts) {
        const elapsed = ts - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        current = Math.round(target * eased);
        el.textContent = current;
        if (progress < 1) requestAnimationFrame(step);
      }

      requestAnimationFrame(step);
    }

    /* ═══════════════════════════════════════════ */
    /* LEADERBOARD (localStorage)                 */
    /* ═══════════════════════════════════════════ */
    function getScores() {
      try {
        return JSON.parse(localStorage.getItem('roocky-quiz-scores') || '[]');
      } catch { return []; }
    }

    function saveScore(score, accuracy, timeTaken) {
      const scores = getScores();
      scores.push({
        score,
        accuracy: Math.round(accuracy),
        timeTaken,
        difficulty: state.difficulty,
        date: new Date().toISOString(),
      });
      scores.sort((a, b) => b.score - a.score);
      localStorage.setItem('roocky-quiz-scores', JSON.stringify(scores.slice(0, 10)));
    }

    function renderLeaderboard() {
      const scores = getScores();
      const list = document.getElementById('leaderboard-list');

      if (scores.length === 0) {
        list.innerHTML = '<p style="color: var(--text-tertiary); font-size: 0.85rem; text-align: center; padding: 1rem;">No scores yet. Be the first!</p>';
        return;
      }

      list.innerHTML = scores.slice(0, 5).map((s, i) => {
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
        const d = new Date(s.date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `
          <div class="leaderboard-entry">
            <span class="leaderboard-rank ${rankClass}">${medal}</span>
            <div class="leaderboard-info">
              <div class="leaderboard-date">${dateStr} · ${s.accuracy}% ACC</div>
              <div class="leaderboard-detail">${DIFFICULTY_CONFIG[s.difficulty]?.label || s.difficulty} · ${s.timeTaken}s</div>
            </div>
            <span class="leaderboard-score">${s.score}</span>
          </div>
        `;
      }).join('');
    }

    /* ═══════════════════════════════════════════ */
    /* CONFETTI                                   */
    /* ═══════════════════════════════════════════ */
    function spawnConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#a78bfa', '#818cf8', '#34d399', '#fbbf24', '#f87171', '#f0f0f5'];

      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        piece.style.animationDelay = Math.random() * 1 + 's';
        piece.style.width = (4 + Math.random() * 8) + 'px';
        piece.style.height = (4 + Math.random() * 8) + 'px';
        container.appendChild(piece);
      }

      setTimeout(() => container.innerHTML = '', 5000);
    }

    /* ═══════════════════════════════════════════ */
    /* SHARE                                      */
    /* ═══════════════════════════════════════════ */
    function shareResults() {
      const accuracy = state.questions.length > 0 ? Math.round((state.correctCount / state.questions.length) * 100) : 0;
      const text = [
        `🧠 Quiz Master — ${state.score} pts`,
        `✅ ${state.correctCount}/${state.questions.length} correct (${accuracy}%)`,
        `🔥 Best streak: ${state.bestStreak}`,
        `⚡ Difficulty: ${DIFFICULTY_CONFIG[state.difficulty].label}`,
        ``,
        `Play at toys.roocky.dev/#quiz-master`,
      ].join('\n');

      navigator.clipboard.writeText(text).then(() => {
        showToast('Results copied to clipboard!');
      }).catch(() => {
        showToast('Could not copy to clipboard');
      });
    }

    /* ═══════════════════════════════════════════ */
    /* TOAST                                      */
    /* ═══════════════════════════════════════════ */
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    /* ═══════════════════════════════════════════ */
    /* RESTART                                    */
    /* ═══════════════════════════════════════════ */
    function restartGame() {
      showScreen('screen-start');
    }

    /* ═══════════════════════════════════════════ */
    /* KEYBOARD SHORTCUTS                         */
    /* ═══════════════════════════════════════════ */
    document.addEventListener('keydown', (e) => {
      const qScreen = document.getElementById('screen-question');
      if (!qScreen.classList.contains('active')) return;

      const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
      const idx = keyMap[e.key.toLowerCase()];

      if (idx !== undefined) {
        const btns = document.querySelectorAll('.answer-btn');
        if (btns[idx] && !btns[idx].disabled) {
          btns[idx].click();
        }
      }
    });
  </script>
</body>
</html>
