<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROOCKY TOYS — Mini Games & Tools</title>
  <meta name="description" content="A collection of mini games, tools, and creative experiments by ROOCKY.DEV." />
  <meta property="og:title" content="ROOCKY TOYS — Mini Games & Tools" />
  <meta property="og:description" content="A collection of mini games, tools, and creative experiments by ROOCKY.DEV." />
  <meta property="og:url" content="https://toys.roocky.dev" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════ */
    /* ROOCKY DESIGN TOKENS                       */
    /* ═══════════════════════════════════════════ */
    :root {
      --bg-primary: #050508;
      --bg-secondary: #0a0a0f;
      --bg-elevated: #111118;
      --bg-card: #0d0d14;
      --bg-glass: rgba(255, 255, 255, 0.03);

      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-tertiary: #55556a;
      --text-accent: #a78bfa;

      --accent-primary: #a78bfa;
      --accent-secondary: #818cf8;
      --accent-glow: rgba(167, 139, 250, 0.15);
      --accent-glow-strong: rgba(167, 139, 250, 0.3);

      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.1);
      --border-accent: rgba(167, 139, 250, 0.2);

      --gradient-hero: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 100, 255, 0.12), transparent);

      --radius-sm: 0.5rem;
      --radius-md: 1rem;
      --radius-lg: 1.5rem;
      --radius-xl: 2rem;
      --radius-full: 9999px;

      --ease-smooth: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-snap: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ═══════════════════════════════════════════ */
    /* RESET & BASE                               */
    /* ═══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: var(--bg-primary);
      color: var(--text-primary);
      scroll-behavior: smooth;
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100%;
      background: var(--bg-primary);
    }

    ::selection {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }

    a { color: inherit; text-decoration: none; }

    /* ═══════════════════════════════════════════ */
    /* GRAIN OVERLAY                              */
    /* ═══════════════════════════════════════════ */
    .grain-overlay {
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.025;
      animation: grain 8s steps(10) infinite;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    }

    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -10%); }
      20% { transform: translate(-15%, 5%); }
      30% { transform: translate(7%, -25%); }
      40% { transform: translate(-5%, 25%); }
      50% { transform: translate(-15%, 10%); }
      60% { transform: translate(15%, 0%); }
      70% { transform: translate(0%, 15%); }
      80% { transform: translate(3%, 35%); }
      90% { transform: translate(-10%, 10%); }
    }

    /* ═══════════════════════════════════════════ */
    /* MOUSE GLOW                                 */
    /* ═══════════════════════════════════════════ */
    .mouse-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle, var(--accent-glow), transparent 70%);
      transform: translate(-50%, -50%);
      transition: left 0.3s var(--ease-smooth), top 0.3s var(--ease-smooth);
      opacity: 0.5;
    }

    /* ═══════════════════════════════════════════ */
    /* DOT GRID                                   */
    /* ═══════════════════════════════════════════ */
    .dot-grid {
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ═══════════════════════════════════════════ */
    /* ANIMATIONS                                 */
    /* ═══════════════════════════════════════════ */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ═══════════════════════════════════════════ */
    /* SCROLLBAR                                  */
    /* ═══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* ═══════════════════════════════════════════ */
    /* TYPOGRAPHY                                 */
    /* ═══════════════════════════════════════════ */
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.875rem;
      border-radius: var(--radius-full);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════ */
    /* NAVBAR                                     */
    /* ═══════════════════════════════════════════ */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 60;
      transition: all 0.7s var(--ease-smooth);
      background: transparent;
    }

    .navbar.scrolled {
      background: rgba(5, 5, 8, 0.8);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .navbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: between;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--accent-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.5s var(--ease-smooth);
    }

    .logo-mark:hover {
      border-radius: var(--radius-md);
      transform: scale(1.05);
    }

    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .logo-text .dim { color: var(--text-tertiary); }

    .navbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      transition: color 0.3s ease;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-full);
    }

    .nav-link:hover {
      color: var(--text-secondary);
    }

    .nav-link.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .back-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      transition: color 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-link:hover { color: var(--accent-primary); }

    /* ═══════════════════════════════════════════ */
    /* HERO                                       */
    /* ═══════════════════════════════════════════ */
    .hero {
      position: relative;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10rem 1.5rem 6rem;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      width: 800px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      background: radial-gradient(circle, var(--accent-primary), var(--accent-secondary), transparent);
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero-badge {
      animation: fade-up 0.8s var(--ease-out) both;
      margin-bottom: 2.5rem;
    }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(48px, 10vw, 120px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.95;
      animation: fade-up 0.8s var(--ease-out) 0.1s both;
    }

    .hero h1 .accent {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      max-width: 520px;
      margin-top: 2rem;
      font-size: 1.125rem;
      line-height: 1.7;
      color: var(--text-secondary);
      animation: fade-up 0.8s var(--ease-out) 0.2s both;
    }

    .hero-stats {
      display: flex;
      gap: 3rem;
      margin-top: 3rem;
      animation: fade-up 0.8s var(--ease-out) 0.3s both;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .hero-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-top: 0.25rem;
    }

    /* ═══════════════════════════════════════════ */
    /* FILTER BAR                                 */
    /* ═══════════════════════════════════════════ */
    .filter-section {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.4s var(--ease-smooth);
    }

    .filter-btn:hover {
      border-color: var(--border-accent);
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.02);
    }

    .filter-btn.active {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
    }

    /* ═══════════════════════════════════════════ */
    /* GALLERY GRID                               */
    /* ═══════════════════════════════════════════ */
    .gallery-section {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1.5rem 6rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    /* ═══════════════════════════════════════════ */
    /* TOY CARD                                   */
    /* ═══════════════════════════════════════════ */
    .toy-card {
      position: relative;
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      transition: all 0.6s var(--ease-smooth);
      cursor: pointer;
      animation: fade-up 0.8s var(--ease-out) both;
    }

    .toy-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-6px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 20px 60px -15px rgba(0, 0, 0, 0.5),
        0 0 30px var(--accent-glow),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
    }

    .toy-card-preview {
      width: 100%;
      aspect-ratio: 16/10;
      background: var(--bg-secondary);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toy-card-preview-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      transition: transform 0.6s var(--ease-smooth);
    }

    .toy-card:hover .toy-card-preview-inner {
      transform: scale(1.05);
    }

    .toy-card-preview .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(167, 139, 250, 0.05) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      pointer-events: none;
    }

    .toy-card-body {
      padding: 1.5rem;
    }

    .toy-card-tags {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .toy-card-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.625rem;
      border-radius: var(--radius-full);
      background: rgba(167, 139, 250, 0.08);
      color: var(--accent-primary);
      border: 1px solid rgba(167, 139, 250, 0.12);
    }

    .toy-card-tag.new {
      background: rgba(52, 211, 153, 0.08);
      color: #34d399;
      border-color: rgba(52, 211, 153, 0.12);
    }

    .toy-card h3 {
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .toy-card p {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .toy-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-subtle);
    }

    .toy-card-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    .toy-card-play {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-primary);
      transition: gap 0.3s var(--ease-smooth);
    }

    .toy-card:hover .toy-card-play {
      gap: 0.75rem;
    }

    /* ═══════════════════════════════════════════ */
    /* EMPTY STATE                                */
    /* ═══════════════════════════════════════════ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 2rem;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    /* ═══════════════════════════════════════════ */
    /* FOOTER                                     */
    /* ═══════════════════════════════════════════ */
    .footer {
      border-top: 1px solid var(--border-subtle);
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .footer-links {
      display: flex;
      gap: 2rem;
    }

    .footer-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      transition: color 0.3s ease;
    }

    .footer-link:hover { color: var(--accent-primary); }

    .footer-copy {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* ═══════════════════════════════════════════ */
    /* TOY VIEWER (IFRAME OVERLAY)                */
    /* ═══════════════════════════════════════════ */
    .toy-viewer {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 5, 8, 0.95);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.4s var(--ease-smooth);
    }

    .toy-viewer.active {
      display: flex;
      opacity: 1;
    }

    .toy-viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .toy-viewer-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toy-viewer-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .toy-viewer-close {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.3s var(--ease-smooth);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toy-viewer-close:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-medium);
      color: var(--text-secondary);
    }

    .toy-viewer iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: var(--bg-primary);
    }

    /* ═══════════════════════════════════════════ */
    /* RESPONSIVE                                 */
    /* ═══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .navbar-inner { padding: 0 1rem; }
      .hero { padding: 8rem 1rem 4rem; min-height: 60vh; }
      .hero-stats { gap: 2rem; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-section, .filter-section { padding-left: 1rem; padding-right: 1rem; }
      .footer-links { gap: 1rem; }
      .nav-link { display: none; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Grain Overlay -->
  <div class="grain-overlay" aria-hidden="true"></div>
  <!-- Mouse Glow -->
  <div id="mouse-glow" class="mouse-glow" aria-hidden="true"></div>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-left" id="nav-logo">
        <div class="logo-mark">T</div>
        <span class="logo-text">roocky<span class="dim">.toys</span></span>
      </a>
      <div class="navbar-right">
        <a href="#gallery" class="nav-link active">Gallery</a>
        <a href="https://roocky.dev" target="_blank" class="back-link">
          ← roocky.dev
        </a>
      </div>
    </div>
  </nav>

  <!-- ═══ HERO ═══ -->
  <section class="hero">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="dot-grid" style="position:absolute;inset:0;opacity:0.3;pointer-events:none;"></div>

    <div class="hero-badge">
      <span class="badge">🎮 ROOCKY TOYS // PLAYGROUND</span>
    </div>

    <h1>
      <span class="accent">TOYS</span>
    </h1>

    <p class="hero-sub">
      A collection of mini games, creative tools, and interactive experiments. Each one is a self-contained toy built for fun.
    </p>

    <div class="hero-stats" id="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-toys">0</div>
        <div class="hero-stat-label">Toys</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-categories">0</div>
        <div class="hero-stat-label">Categories</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-new">0</div>
        <div class="hero-stat-label">New</div>
      </div>
    </div>
  </section>

  <!-- ═══ FILTER BAR ═══ -->
  <section class="filter-section" id="gallery">
    <div class="filter-bar" id="filter-bar">
      <!-- Dynamically populated -->
    </div>
  </section>

  <!-- ═══ GALLERY GRID ═══ -->
  <section class="gallery-section">
    <div class="gallery-grid" id="gallery-grid">
      <!-- Dynamically populated -->
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://roocky.dev" target="_blank" class="footer-link">Portfolio ↗</a>
        <a href="https://github.com/ROOCKY-dev" target="_blank" class="footer-link">GitHub ↗</a>
      </div>
      <span class="footer-copy">© 2026 ROOCKY.DEV // TOYS COLLECTION</span>
    </div>
  </footer>

  <!-- ═══ TOY VIEWER ═══ -->
  <div class="toy-viewer" id="toy-viewer">
    <div class="toy-viewer-header">
      <div class="toy-viewer-title">
        <span class="dot"></span>
        <span id="toy-viewer-name">Loading...</span>
      </div>
      <button class="toy-viewer-close" id="toy-viewer-close" onclick="closeToyViewer()">
        ESC &middot; Close
      </button>
    </div>
    <iframe id="toy-viewer-iframe" title="Toy viewer"></iframe>
  </div>

  <script>
    /* ═══════════════════════════════════════════ */
    /* TOYS REGISTRY                              */
    /* ═══════════════════════════════════════════ */
    const TOYS = [
      {
        id: 'quiz-master',
        name: 'Quiz Master',
        description: 'Test your knowledge across Tech, Science, Pop Culture, and more. Features difficulty modes, streak bonuses, timer, and a leaderboard.',
        emoji: '🧠',
        category: 'game',
        tags: ['game', 'new'],
        date: '2026-06-23',
        path: 'toys/quiz-master/index.html',
        color: '#a78bfa',
      },
      // ↓ ADD NEW TOYS HERE ↓
      // {
      //   id: 'example',
      //   name: 'Example Toy',
      //   description: 'Description of the toy.',
      //   emoji: '🎲',
      //   category: 'tool',
      //   tags: ['tool'],
      //   date: '2026-01-01',
      //   path: 'toys/example/index.html',
      //   color: '#818cf8',
      // },
    ];

    /* ═══════════════════════════════════════════ */
    /* RENDER                                     */
    /* ═══════════════════════════════════════════ */
    const grid = document.getElementById('gallery-grid');
    const filterBar = document.getElementById('filter-bar');
    let activeFilter = 'all';

    // Collect categories
    const categories = ['all', ...new Set(TOYS.map(t => t.category))];

    // Render filter buttons
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = `filter-btn${cat === 'all' ? ' active' : ''}`;
      btn.textContent = cat;
      btn.onclick = () => {
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery();
      };
      filterBar.appendChild(btn);
    });

    function renderGallery() {
      const filtered = activeFilter === 'all' ? TOYS : TOYS.filter(t => t.category === activeFilter);
      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🏗️</div>
            <h3>No toys here yet</h3>
            <p>More are being built. Check back soon.</p>
          </div>
        `;
        return;
      }

      filtered.forEach((toy, i) => {
        const card = document.createElement('article');
        card.className = 'toy-card';
        card.style.animationDelay = `${i * 0.1}s`;
        card.onclick = () => openToyViewer(toy);
        card.innerHTML = `
          <div class="toy-card-preview" style="background: linear-gradient(135deg, ${toy.color}08, var(--bg-secondary))">
            <div class="toy-card-preview-inner">${toy.emoji}</div>
            <div class="shimmer"></div>
          </div>
          <div class="toy-card-body">
            <div class="toy-card-tags">
              ${toy.tags.map(t => `<span class="toy-card-tag${t === 'new' ? ' new' : ''}">${t}</span>`).join('')}
            </div>
            <h3>${toy.name}</h3>
            <p>${toy.description}</p>
          </div>
          <div class="toy-card-footer">
            <span class="toy-card-date">${formatDate(toy.date)}</span>
            <span class="toy-card-play">Play →</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function formatDate(d) {
      const date = new Date(d);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
    }

    // Stats
    document.getElementById('stat-toys').textContent = TOYS.length;
    document.getElementById('stat-categories').textContent = new Set(TOYS.map(t => t.category)).size;
    document.getElementById('stat-new').textContent = TOYS.filter(t => t.tags.includes('new')).length;

    renderGallery();

    /* ═══════════════════════════════════════════ */
    /* TOY VIEWER                                 */
    /* ═══════════════════════════════════════════ */
    function openToyViewer(toy) {
      const viewer = document.getElementById('toy-viewer');
      const iframe = document.getElementById('toy-viewer-iframe');
      const name = document.getElementById('toy-viewer-name');

      name.textContent = toy.name;
      iframe.src = toy.path;
      viewer.classList.add('active');
      document.body.style.overflow = 'hidden';

      // Push hash state
      history.pushState({ toy: toy.id }, '', `#${toy.id}`);
    }

    function closeToyViewer() {
      const viewer = document.getElementById('toy-viewer');
      const iframe = document.getElementById('toy-viewer-iframe');

      viewer.classList.remove('active');
      iframe.src = '';
      document.body.style.overflow = '';
      history.pushState({}, '', window.location.pathname);
    }

    // ESC key to close
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeToyViewer();
    });

    // Handle hash on load
    window.addEventListener('load', () => {
      const hash = window.location.hash.slice(1);
      if (hash) {
        const toy = TOYS.find(t => t.id === hash);
        if (toy) openToyViewer(toy);
      }
    });

    // Handle browser back/forward
    window.addEventListener('popstate', () => {
      const hash = window.location.hash.slice(1);
      if (hash) {
        const toy = TOYS.find(t => t.id === hash);
        if (toy) openToyViewer(toy);
      } else {
        closeToyViewer();
      }
    });

    /* ═══════════════════════════════════════════ */
    /* NAVBAR SCROLL                              */
    /* ═══════════════════════════════════════════ */
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    /* ═══════════════════════════════════════════ */
    /* MOUSE GLOW                                 */
    /* ═══════════════════════════════════════════ */
    (function() {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const glow = document.getElementById('mouse-glow');
      if (!glow) return;
      let rAF;
      window.addEventListener('mousemove', (e) => {
        if (rAF) return;
        rAF = requestAnimationFrame(() => {
          glow.style.left = e.clientX + 'px';
          glow.style.top = e.clientY + 'px';
          rAF = null;
        });
      });
    })();
  </script>
</body>
</html>
